services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql_server_container
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-Ab12345678@}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
